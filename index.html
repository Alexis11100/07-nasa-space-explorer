<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button id="get-images-btn">Get Space Images</button>
    </div>
    <p id="space-fact"></p>
    <p id="loading-message" style="display: none;">🔄 Loading space photos…</p>
    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
        
      </div>
    </div>

    <div id="modal" class="modal" style="display: none;">
      <div class="modal-content">
        <button id="modal-close" type="button">Close</button>
        <h2 id="modal-title"></h2>
        <p id="modal-date"></p>
        <img id="modal-image" alt="NASA image" />
        <a id="modal-video-link" href="#" target="_blank" rel="noopener noreferrer" style="display: none;"></a>
        <p id="modal-explanation"></p>
      </div>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
